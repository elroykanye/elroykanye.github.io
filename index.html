<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Instant redirect to the current site -->
  <meta http-equiv="refresh" content="0; url=https://elroykimbi.dev/" />
  <link rel="canonical" href="https://elroykimbi.dev/" />

  <title>Elroy Kanye — elroykimbi.dev</title>
  <meta name="description" content="Elroy Kanye — Technical Lead & Full Stack Engineer. This page has moved to elroykimbi.dev." />
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #060815;
      --ink: #e8ecff;
      --muted: #9aa4d0;
      --accent: #7c9dff;
      --accent-2: #b78cff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: 6vw 5vw;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }
    /* Aurora field */
    body::before, body::after {
      content: "";
      position: fixed;
      inset: -30%;
      z-index: -1;
      background:
        radial-gradient(40% 45% at 22% 28%, rgba(124,157,255,.45), transparent 60%),
        radial-gradient(38% 42% at 78% 24%, rgba(183,140,255,.38), transparent 62%),
        radial-gradient(45% 50% at 60% 82%, rgba(88,220,200,.28), transparent 60%);
      filter: blur(60px) saturate(130%);
      animation: drift 18s ease-in-out infinite alternate;
    }
    body::after { animation-duration: 26s; animation-direction: alternate-reverse; opacity: .7; }
    @keyframes drift {
      from { transform: translate3d(-4%, -3%, 0) scale(1); }
      to   { transform: translate3d(5%, 4%, 0) scale(1.08); }
    }

    .card {
      position: relative;
      max-width: 30rem;
      width: 100%;
      padding: clamp(1.75rem, 5vw, 2.75rem);
      text-align: center;
      border-radius: 22px;
      background: rgba(16, 20, 40, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 30px 80px -30px rgba(0, 0, 0, .8), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 3rem; height: 3rem;
      margin-bottom: 1.25rem;
      border-radius: 14px;
      font-size: 1.5rem;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 30px -8px var(--accent);
    }

    h1 {
      margin: 0 0 .4rem;
      font-size: clamp(1.25rem, 3.5vw, 1.6rem);
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    p {
      margin: 0 auto;
      max-width: 24rem;
      color: var(--muted);
      line-height: 1.6;
      font-size: .975rem;
    }

    a.cta {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1.6rem;
      padding: .7rem 1.25rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: .95rem;
      text-decoration: none;
      color: #0a0c18;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 30px -10px var(--accent);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    a.cta:hover { transform: translateY(-2px); box-shadow: 0 16px 40px -12px var(--accent); }
    a.cta:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

    .hint {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      margin-top: 1.5rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.25); } }

    @media (prefers-reduced-motion: reduce) {
      body::before, body::after, .dot { animation: none; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">✦</div>
    <h1>This page has moved</h1>
    <p>Elroy Kanye's portfolio now lives at <strong>elroykimbi.dev</strong>. You're being redirected there now.</p>
    <a class="cta" href="https://elroykimbi.dev/">Go to elroykimbi.dev &rarr;</a>
    <div class="hint"><span class="dot"></span> Redirecting…</div>
  </main>

  <script>
    // Fastest path: replace history entry so Back doesn't loop here.
    window.location.replace("https://elroykimbi.dev/");
  </script>
</body>
</html>
